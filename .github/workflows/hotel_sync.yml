name: Hotel IPTV Auto Gather

on:
  workflow_dispatch:       # 支持手动点击 "Run workflow" 触发
  push:
    paths:
      - 'py/Hotel/hotel_gather.py' # 当你修改脚本时也触发一次测试

jobs:
  update_hotel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run Hotel Gather Script
        run: |
          # 运行你保存的脚本
          python py/Hotel/hotel_gather.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加生成的文件（对应你脚本里的 2026/Hotel 目录）
          git add Hotel/*.m3u
          
          # 检查是否有文件变动
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto Update: Hotel IPTV List $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
