name: Hotel IPTV Auto Gather

on:
  workflow_dispatch:
  push:
    paths:
      - 'md/hotel_gather.py'

jobs:
  update_hotel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 获取所有历史，防止 push 冲突
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run Hotel Gather Script
        env:
          PYTHONUNBUFFERED: "1"  # 强制 Python 实时输出日志到控制台
        run: |
          python md/hotel_gather.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 使用 -A 会追踪到文件的修改、删除和新增
          git add hotel/*.m3u
          
          # 2. 检查是否有变动
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "📊 覆盖更新：Hotel IPTV 列表 $(date +'%Y-%m-%d %H:%M') [skip ci]"
            
            # 3. 使用 rebase 策略处理潜在冲突，确保覆盖成功
            git pull --rebase origin main
            git push origin main
          fi
